<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Monitor body -->
  <rect x="4" y="6" width="40" height="28" rx="4" ry="4" fill="#181c24" stroke="#1D9E75" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="8" y="10" width="32" height="20" rx="2" fill="#0f1117"/>
  <!-- EKG / heartbeat line -->
  <polyline
    points="9,20 14,20 17,13 20,27 23,16 26,20 29,20 32,14 35,20 39,20"
    fill="none"
    stroke="#1D9E75"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Stand neck -->
  <rect x="21" y="34" width="6" height="6" fill="#1D9E75" rx="1"/>
  <!-- Stand base -->
  <rect x="14" y="40" width="20" height="3" fill="#1D9E75" rx="1.5"/>
</svg>
