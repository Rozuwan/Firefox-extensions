<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Monitor body -->
  <rect x="8" y="14" width="112" height="76" rx="10" ry="10" fill="#181c24" stroke="#1D9E75" stroke-width="5"/>
  <!-- Screen area -->
  <rect x="18" y="24" width="92" height="56" rx="4" fill="#0f1117"/>
  <!-- EKG / heartbeat line -->
  <polyline
    points="22,52 34,52 42,34 50,70 58,42 66,52 74,52 84,36 94,52 106,52"
    fill="none"
    stroke="#1D9E75"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Stand neck -->
  <rect x="54" y="90" width="20" height="18" fill="#1D9E75" rx="3"/>
  <!-- Stand base -->
  <rect x="36" y="108" width="56" height="8" fill="#1D9E75" rx="4"/>
</svg>
